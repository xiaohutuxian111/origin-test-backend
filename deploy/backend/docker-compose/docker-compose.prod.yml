networks:
  fba_network:
    name: fba_network
    driver: bridge

volumes:
  fba_postgres:
    name: fba_postgres
  fba_redis:
    name: fba_redis
  fba_static:
    name: fba_static
  fba_static_upload:
    name: fba_static_upload
  fba_rabbitmq:
    name: fba_rabbitmq

services:
  fba_server:
    image: ${FBA_SERVER_IMAGE:?set FBA_SERVER_IMAGE in .env.docker.prod}
    container_name: fba_server
    restart: always
    environment:
      - TZ=Asia/Shanghai
    depends_on:
      - fba_postgres
      - fba_redis
    volumes:
      - ${FBA_ENV_FILE:-./.env.server.prod}:/fba/backend/.env:ro
      - fba_static:/fba/backend/app/static
      - fba_static_upload:/fba/backend/static/upload
      - ${FBA_SERVER_LOG_DIR:-./logs/fba}:/var/log/fba
    networks:
      - fba_network
    command:
      - bash
      - -c
      - |
        wait-for-it -s fba_postgres:5432 -s fba_redis:6379 -t 300
        supervisord -c /etc/supervisor/supervisord.conf

  fba_postgres:
    image: ${POSTGRES_IMAGE:-postgres:16}
    container_name: fba_postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fba}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.docker.prod}
      TZ: Asia/Shanghai
    volumes:
      - fba_postgres:/var/lib/postgresql/data
    networks:
      - fba_network

  fba_redis:
    image: ${REDIS_IMAGE:-redis:7}
    container_name: fba_redis
    restart: always
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - fba_redis:/data
    networks:
      - fba_network
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - ${REDIS_PASSWORD:?set REDIS_PASSWORD in .env.docker.prod}

  fba_nginx:
    image: ${NGINX_IMAGE:-nginx:1.27}
    container_name: fba_nginx
    restart: always
    depends_on:
      - fba_server
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ${FBA_NGINX_CONF:-./nginx.prod.conf}:/etc/nginx/conf.d/default.conf:ro
      - ${FBA_SSL_CERT_DIR:-./ssl}:/etc/nginx/ssl:ro
      - fba_static:/www/fba_server/backend/static:ro
      - fba_static_upload:/www/fba_server/backend/upload:ro
    networks:
      - fba_network

  fba_rabbitmq:
    hostname: fba_rabbitmq
    image: ${RABBITMQ_IMAGE:-rabbitmq:3.13.7-management}
    container_name: fba_rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-fba}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:?set RABBITMQ_DEFAULT_PASS in .env.docker.prod}
      TZ: Asia/Shanghai
    volumes:
      - fba_rabbitmq:/var/lib/rabbitmq
    networks:
      - fba_network

  fba_celery_worker:
    image: ${FBA_CELERY_WORKER_IMAGE:?set FBA_CELERY_WORKER_IMAGE in .env.docker.prod}
    container_name: fba_celery_worker
    restart: always
    environment:
      - TZ=Asia/Shanghai
    depends_on:
      - fba_rabbitmq
      - fba_redis
      - fba_postgres
    volumes:
      - ${FBA_ENV_FILE:-./.env.server.prod}:/fba/backend/.env:ro
      - ${FBA_SERVER_LOG_DIR:-./logs/fba}:/var/log/fba
    networks:
      - fba_network
    command:
      - bash
      - -c
      - |
        wait-for-it -s fba_rabbitmq:5672 -s fba_redis:6379 -s fba_postgres:5432 -t 300
        supervisord -c /etc/supervisor/supervisord.conf

  fba_celery_beat:
    image: ${FBA_CELERY_BEAT_IMAGE:?set FBA_CELERY_BEAT_IMAGE in .env.docker.prod}
    container_name: fba_celery_beat
    restart: always
    environment:
      - TZ=Asia/Shanghai
    depends_on:
      - fba_rabbitmq
      - fba_celery_worker
    volumes:
      - ${FBA_ENV_FILE:-./.env.server.prod}:/fba/backend/.env:ro
      - ${FBA_SERVER_LOG_DIR:-./logs/fba}:/var/log/fba
    networks:
      - fba_network
    command:
      - bash
      - -c
      - |
        wait-for-it -s fba_rabbitmq:5672 -t 300
        supervisord -c /etc/supervisor/supervisord.conf

  fba_celery_flower:
    image: ${FBA_CELERY_FLOWER_IMAGE:?set FBA_CELERY_FLOWER_IMAGE in .env.docker.prod}
    container_name: fba_celery_flower
    restart: always
    environment:
      - TZ=Asia/Shanghai
    depends_on:
      - fba_rabbitmq
      - fba_celery_worker
    volumes:
      - ${FBA_ENV_FILE:-./.env.server.prod}:/fba/backend/.env:ro
      - ${FBA_SERVER_LOG_DIR:-./logs/fba}:/var/log/fba
    networks:
      - fba_network
    command:
      - bash
      - -c
      - |
        wait-for-it -s fba_rabbitmq:5672 -t 300
        supervisord -c /etc/supervisor/supervisord.conf
